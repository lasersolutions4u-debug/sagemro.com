<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found | SAGEMRO</title>
    <style>
      :root { color-scheme: light; font-family: Arial, sans-serif; background: #f5f7f8; color: #172027; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; box-sizing: border-box; }
      main { width: min(100%, 420px); padding: 32px; text-align: center; background: #fff; border: 1px solid #d7dfe3; border-radius: 16px; box-shadow: 0 12px 30px rgba(23, 32, 39, .08); }
      .code { color: #d98b22; font-size: 12px; font-weight: 700; letter-spacing: .24em; }
      h1 { margin: 12px 0 0; font-size: 28px; }
      p { margin: 12px 0 0; color: #5c6a72; line-height: 1.6; }
      a { display: inline-block; margin-top: 24px; padding: 10px 16px; border-radius: 10px; background: #d98b22; color: #fff; text-decoration: none; }
    </style>
  </head>
  <body>
    <main>
      <div class="code">404</div>
      <h1 id="title">Page not found</h1>
      <p id="body">The page you requested does not exist or the link has expired.</p>
      <a id="back" href="/">Back to Admin</a>
    </main>
    <script>
      if (location.hostname.endsWith('.cn')) {
        document.documentElement.lang = 'zh-CN';
        document.title = '页面不存在 | SAGEMRO';
        document.getElementById('title').textContent = '页面不存在';
        document.getElementById('body').textContent = '你访问的页面不存在，或者链接已经失效。';
        document.getElementById('back').textContent = '返回管理后台';
      }
    </script>
  </body>
</html>
