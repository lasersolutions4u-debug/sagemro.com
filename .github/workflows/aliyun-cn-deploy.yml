name: Deploy China Edition to Aliyun ECS

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aliyun-cn-production
  cancel-in-progress: false

jobs:
  deploy-cn:
    name: Build and deploy China edition
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate deployment ref
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "china-edition" ]; then
            echo "::error::Aliyun China production deploy must run from china-edition. Current ref: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Validate Aliyun deploy secrets
        env:
          ALIYUN_ECS_HOST: ${{ secrets.ALIYUN_ECS_HOST }}
          ALIYUN_ECS_PORT: ${{ secrets.ALIYUN_ECS_PORT }}
          ALIYUN_ECS_USER: ${{ secrets.ALIYUN_ECS_USER }}
          ALIYUN_ECS_SSH_KEY: ${{ secrets.ALIYUN_ECS_SSH_KEY }}
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_REGION_ID: ${{ secrets.ALIYUN_REGION_ID }}
          ALIYUN_SECURITY_GROUP_ID: ${{ secrets.ALIYUN_SECURITY_GROUP_ID }}
        run: |
          set -euo pipefail
          missing=0
          for name in ALIYUN_ECS_HOST ALIYUN_ECS_PORT ALIYUN_ECS_USER ALIYUN_ECS_SSH_KEY ALIYUN_ACCESS_KEY_ID ALIYUN_ACCESS_KEY_SECRET ALIYUN_REGION_ID ALIYUN_SECURITY_GROUP_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Build frontend
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npm test --if-present
          npm run build

      - name: Build admin
        working-directory: admin
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npm test --if-present
          npm run build

      - name: Package release
        run: |
          set -euo pipefail
          RELEASE_ID="${GITHUB_SHA:0:12}-${GITHUB_RUN_NUMBER}"
          PACKAGE_NAME="sagemro-cn-release-${RELEASE_ID}.tgz"

          echo "RELEASE_ID=${RELEASE_ID}" >> "$GITHUB_ENV"
          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> "$GITHUB_ENV"

          mkdir -p release/frontend release/admin release/ops
          cp -a frontend/dist/. release/frontend/
          cp -a admin/dist/. release/admin/
          cp ops/enable_nginx_http2.py release/ops/
          tar -czf "$PACKAGE_NAME" -C release .

          test -f release/frontend/index.html
          test -f release/admin/index.html
          test -f release/ops/enable_nginx_http2.py

      - name: Setup Aliyun CLI
        uses: aliyun/setup-aliyun-cli-action@v1

      - name: Detect GitHub runner IP
        run: |
          set -euo pipefail
          runner_ip="$(curl -fsS https://checkip.amazonaws.com | tr -d '[:space:]')"
          if ! [[ "$runner_ip" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Unable to detect a valid IPv4 runner IP: ${runner_ip}"
            exit 1
          fi

          echo "::add-mask::${runner_ip}"
          echo "RUNNER_CIDR=${runner_ip}/32" >> "$GITHUB_ENV"

      - name: Allow GitHub runner SSH
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_REGION_ID: ${{ secrets.ALIYUN_REGION_ID }}
          ALIYUN_SECURITY_GROUP_ID: ${{ secrets.ALIYUN_SECURITY_GROUP_ID }}
          ALIYUN_ECS_PORT: ${{ secrets.ALIYUN_ECS_PORT }}
        run: |
          set -euo pipefail
          aliyun configure set \
            --profile sagemro-ci \
            --mode AK \
            --region "$ALIYUN_REGION_ID" \
            --access-key-id "$ALIYUN_ACCESS_KEY_ID" \
            --access-key-secret "$ALIYUN_ACCESS_KEY_SECRET"

          aliyun ecs RevokeSecurityGroup \
            --profile sagemro-ci \
            --RegionId "$ALIYUN_REGION_ID" \
            --SecurityGroupId "$ALIYUN_SECURITY_GROUP_ID" \
            --IpProtocol tcp \
            --PortRange "$ALIYUN_ECS_PORT/$ALIYUN_ECS_PORT" \
            --SourceCidrIp "$RUNNER_CIDR" >/dev/null 2>&1 || true

          aliyun ecs AuthorizeSecurityGroup \
            --profile sagemro-ci \
            --RegionId "$ALIYUN_REGION_ID" \
            --SecurityGroupId "$ALIYUN_SECURITY_GROUP_ID" \
            --IpProtocol tcp \
            --PortRange "$ALIYUN_ECS_PORT/$ALIYUN_ECS_PORT" \
            --SourceCidrIp "$RUNNER_CIDR" \
            --Policy accept \
            --Priority 1

          echo "RUNNER_SSH_RULE_ADDED=true" >> "$GITHUB_ENV"

      - name: Configure SSH
        env:
          ALIYUN_ECS_HOST: ${{ secrets.ALIYUN_ECS_HOST }}
          ALIYUN_ECS_PORT: ${{ secrets.ALIYUN_ECS_PORT }}
          ALIYUN_ECS_USER: ${{ secrets.ALIYUN_ECS_USER }}
          ALIYUN_ECS_SSH_KEY: ${{ secrets.ALIYUN_ECS_SSH_KEY }}
          ALIYUN_ECS_HOST_KEY: ${{ secrets.ALIYUN_ECS_HOST_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$ALIYUN_ECS_SSH_KEY" > ~/.ssh/aliyun_ecs
          chmod 600 ~/.ssh/aliyun_ecs
          : > ~/.ssh/known_hosts
          if [ -n "${ALIYUN_ECS_HOST_KEY:-}" ]; then
            printf '%s\n' "$ALIYUN_ECS_HOST_KEY" >> ~/.ssh/known_hosts
          else
            set +e
            ssh -p "$ALIYUN_ECS_PORT" \
              -o BatchMode=yes \
              -o PreferredAuthentications=none \
              -o StrictHostKeyChecking=accept-new \
              "$ALIYUN_ECS_USER@$ALIYUN_ECS_HOST" true
            ssh_status=$?
            set -e

            if [ ! -s ~/.ssh/known_hosts ]; then
              echo "::error::Unable to record Aliyun ECS host key. SSH exited with ${ssh_status}."
              exit 1
            fi
          fi

      - name: Upload release
        env:
          ALIYUN_ECS_HOST: ${{ secrets.ALIYUN_ECS_HOST }}
          ALIYUN_ECS_PORT: ${{ secrets.ALIYUN_ECS_PORT }}
          ALIYUN_ECS_USER: ${{ secrets.ALIYUN_ECS_USER }}
        run: |
          set -euo pipefail
          scp -i ~/.ssh/aliyun_ecs -P "$ALIYUN_ECS_PORT" \
            -o StrictHostKeyChecking=yes \
            "$PACKAGE_NAME" \
            "$ALIYUN_ECS_USER@$ALIYUN_ECS_HOST:/tmp/$PACKAGE_NAME"

      - name: Activate release
        id: activate
        env:
          ALIYUN_ECS_HOST: ${{ secrets.ALIYUN_ECS_HOST }}
          ALIYUN_ECS_PORT: ${{ secrets.ALIYUN_ECS_PORT }}
          ALIYUN_ECS_USER: ${{ secrets.ALIYUN_ECS_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/aliyun_ecs -p "$ALIYUN_ECS_PORT" \
            -o StrictHostKeyChecking=yes \
            "$ALIYUN_ECS_USER@$ALIYUN_ECS_HOST" \
            "RELEASE_ID='$RELEASE_ID' PACKAGE_NAME='$PACKAGE_NAME' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          package="/tmp/${PACKAGE_NAME}"
          release="/var/www/sagemro-cn/releases/${RELEASE_ID}"
          current="/var/www/sagemro-cn/current"

          SUDO=""
          if [ "$(id -u)" -ne 0 ]; then
            SUDO="sudo"
          fi

          $SUDO mkdir -p "$release" "$current"
          $SUDO tar -xzf "$package" -C "$release"

          test -f "$release/frontend/index.html"
          test -f "$release/admin/index.html"

          backup_root="/var/backups/sagemro-nginx"
          release_state="$backup_root/${RELEASE_ID}.release"
          nginx_backup="$backup_root/${RELEASE_ID}.tgz"
          performance_conf="/etc/nginx/conf.d/sagemro-cn-performance.conf"
          performance_backup="$backup_root/${RELEASE_ID}.performance.conf"
          performance_missing_marker="$backup_root/${RELEASE_ID}.performance.missing"

          $SUDO mkdir -p "$backup_root"
          capture_previous_target() {
            link_path="$1"
            if $SUDO test -L "$link_path" || $SUDO test -e "$link_path"; then
              readlink -f "$link_path"
            else
              printf '__MISSING__'
            fi
          }

          previous_frontend="$(capture_previous_target "$current/frontend")"
          previous_engineer="$(capture_previous_target "$current/engineer")"
          previous_admin="$(capture_previous_target "$current/admin")"
          printf '%s\n' "$previous_frontend" "$previous_engineer" "$previous_admin" | $SUDO tee "$release_state" > /dev/null

          if $SUDO test -e "$performance_conf"; then
            $SUDO cp -a "$performance_conf" "$performance_backup"
            $SUDO rm -f "$performance_missing_marker"
          else
            $SUDO touch "$performance_missing_marker"
          fi

          nginx_config_files="$($SUDO grep -RIlE 'server_name[^;]*sagemro\.cn' /etc/nginx/sites-enabled /etc/nginx/conf.d 2>/dev/null \
            | while IFS= read -r nginx_config_file; do readlink -f "$nginx_config_file"; done \
            | sort -u || true)"
          if [ -z "$nginx_config_files" ]; then
            echo "Unable to locate the active sagemro.cn Nginx server configuration." >&2
            exit 1
          fi
          $SUDO tar -czf "$nginx_backup" $nginx_config_files

          $SUDO ln -sfnT "$release/frontend" "$current/frontend"
          $SUDO ln -sfnT "$release/frontend" "$current/engineer"
          $SUDO ln -sfnT "$release/admin" "$current/admin"

          $SUDO tee "$performance_conf" > /dev/null <<'NGINX'
          map "$host:$request_uri" $sagemro_asset_cache_control {
            default "";
            ~^((www\.)?sagemro\.cn|admin\.sagemro\.cn|engineer\.sagemro\.cn):/assets/ "public, max-age=31536000, immutable";
            ~^((www\.)?sagemro\.cn|admin\.sagemro\.cn|engineer\.sagemro\.cn):/sagemro-logo\.png$ "public, max-age=86400";
            ~^((www\.)?sagemro\.cn|admin\.sagemro\.cn|engineer\.sagemro\.cn):/ "no-cache";
          }

          gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml font/woff2;
          add_header Cache-Control $sagemro_asset_cache_control always;
          NGINX

          $SUDO python3 "$release/ops/enable_nginx_http2.py" $nginx_config_files
          $SUDO nginx -t
          $SUDO systemctl reload nginx

          echo "Activated release: $release"
          REMOTE_SCRIPT

      - name: Health checks
        id: health
        run: |
          set -euo pipefail
          curl -fsS --retry 3 --retry-delay 2 https://sagemro.cn/ >/dev/null
          curl -fsS --retry 3 --retry-delay 2 https://admin.sagemro.cn/ >/dev/null
          curl -fsS --retry 3 --retry-delay 2 https://engineer.sagemro.cn/ >/dev/null
          curl -fsS --retry 3 --retry-delay 2 https://api.sagemro.cn/health >/dev/null

          for site_host in sagemro.cn admin.sagemro.cn engineer.sagemro.cn; do
            site_url="https://${site_host}"
            http_version="$(curl -fsS --http2 -o /dev/null -w '%{http_version}' "$site_url/")"
            if [ "$http_version" != "2" ]; then
              echo "::error::${site_host} negotiated HTTP/$http_version instead of HTTP/2"
              exit 1
            fi

            root_headers="$(curl -fsS -D - -o /dev/null "$site_url/" | tr -d '\r')"
            grep -Eqi '^cache-control:.*no-cache' <<< "$root_headers" || {
              echo "::error::${site_host} HTML is missing the no-cache policy"
              exit 1
            }

            page_html="$(curl -fsS "$site_url/")"
            asset_path="$(sed -n 's/.*src="\([^"]*\/assets\/index-[^"]*\.js\)".*/\1/p' <<< "$page_html" | head -1)"
            if [ -z "$asset_path" ]; then
              echo "::error::Unable to locate the ${site_host} entry asset"
              exit 1
            fi

            asset_headers="$(curl --compressed -fsS -D - -o /dev/null "${site_url}${asset_path}" | tr -d '\r')"
            grep -qi '^content-encoding: gzip$' <<< "$asset_headers" || {
              echo "::error::${site_host} JavaScript is not gzip compressed"
              exit 1
            }

            asset_cache_control="$(grep -i '^cache-control:' <<< "$asset_headers" | sed 's/^[^:]*:[[:space:]]*//' | tr '[:upper:]' '[:lower:]' | tr '\n' ',')"
            public_found=false
            immutable_found=false
            max_age_count=0
            cache_conflict=false
            IFS=',' read -ra cache_directives <<< "$asset_cache_control"
            for cache_directive in "${cache_directives[@]}"; do
              cache_directive="$(xargs <<< "$cache_directive")"
              case "$cache_directive" in
                public) public_found=true ;;
                immutable) immutable_found=true ;;
                max-age=31536000) max_age_count=$((max_age_count + 1)) ;;
                max-age=*|s-maxage=*|private|no-cache|no-store) cache_conflict=true ;;
              esac
            done
            if [ "$public_found" != "true" ] || [ "$immutable_found" != "true" ] || [ "$max_age_count" -ne 1 ] || [ "$cache_conflict" = "true" ]; then
              echo "::error::${site_host} JavaScript has invalid cache directives: ${asset_cache_control}"
              exit 1
            fi
          done

      - name: Roll back failed China release
        if: ${{ always() && (steps.activate.outcome == 'failure' || steps.health.outcome == 'failure') }}
        env:
          ALIYUN_ECS_HOST: ${{ secrets.ALIYUN_ECS_HOST }}
          ALIYUN_ECS_PORT: ${{ secrets.ALIYUN_ECS_PORT }}
          ALIYUN_ECS_USER: ${{ secrets.ALIYUN_ECS_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/aliyun_ecs -p "$ALIYUN_ECS_PORT" \
            -o StrictHostKeyChecking=yes \
            "$ALIYUN_ECS_USER@$ALIYUN_ECS_HOST" \
            "RELEASE_ID='$RELEASE_ID' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          current="/var/www/sagemro-cn/current"
          backup_root="/var/backups/sagemro-nginx"
          release_state="$backup_root/${RELEASE_ID}.release"
          nginx_backup="$backup_root/${RELEASE_ID}.tgz"
          performance_conf="/etc/nginx/conf.d/sagemro-cn-performance.conf"
          performance_backup="$backup_root/${RELEASE_ID}.performance.conf"
          performance_missing_marker="$backup_root/${RELEASE_ID}.performance.missing"

          SUDO=""
          if [ "$(id -u)" -ne 0 ]; then
            SUDO="sudo"
          fi

          if ! $SUDO test -f "$release_state"; then
            echo "No activation state found; nothing to roll back."
            exit 0
          fi

          mapfile -t previous_releases < <($SUDO cat "$release_state")
          if [ "${#previous_releases[@]}" -lt 3 ]; then
            echo "Activation state is incomplete; refusing an unsafe rollback." >&2
            exit 1
          fi

          if $SUDO test -f "$nginx_backup"; then
            $SUDO tar -xzf "$nginx_backup" -C /
          fi
          if $SUDO test -f "$performance_backup"; then
            $SUDO cp -a "$performance_backup" "$performance_conf"
          elif $SUDO test -f "$performance_missing_marker"; then
            $SUDO rm -f "$performance_conf"
          fi

          restore_link() {
            previous_target="$1"
            link_path="$2"
            if [ "$previous_target" = "__MISSING__" ]; then
              $SUDO rm -f "$link_path"
            else
              $SUDO ln -sfnT "$previous_target" "$link_path"
            fi
          }

          restore_link "${previous_releases[0]}" "$current/frontend"
          restore_link "${previous_releases[1]}" "$current/engineer"
          restore_link "${previous_releases[2]}" "$current/admin"

          $SUDO nginx -t
          $SUDO systemctl reload nginx
          echo "Rolled back failed release: ${RELEASE_ID}"
          REMOTE_SCRIPT

      - name: Revoke GitHub runner SSH
        if: always()
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_REGION_ID: ${{ secrets.ALIYUN_REGION_ID }}
          ALIYUN_SECURITY_GROUP_ID: ${{ secrets.ALIYUN_SECURITY_GROUP_ID }}
          ALIYUN_ECS_PORT: ${{ secrets.ALIYUN_ECS_PORT }}
        run: |
          set -euo pipefail
          if [ "${RUNNER_SSH_RULE_ADDED:-}" != "true" ] || [ -z "${RUNNER_CIDR:-}" ]; then
            echo "No temporary runner SSH rule was recorded; skipping cleanup."
            exit 0
          fi

          aliyun configure set \
            --profile sagemro-ci \
            --mode AK \
            --region "$ALIYUN_REGION_ID" \
            --access-key-id "$ALIYUN_ACCESS_KEY_ID" \
            --access-key-secret "$ALIYUN_ACCESS_KEY_SECRET"

          aliyun ecs RevokeSecurityGroup \
            --profile sagemro-ci \
            --RegionId "$ALIYUN_REGION_ID" \
            --SecurityGroupId "$ALIYUN_SECURITY_GROUP_ID" \
            --IpProtocol tcp \
            --PortRange "$ALIYUN_ECS_PORT/$ALIYUN_ECS_PORT" \
            --SourceCidrIp "$RUNNER_CIDR"

      - name: Deployment summary
        run: |
          {
            echo "### Aliyun China deploy"
            echo ""
            echo "- Release: \`$RELEASE_ID\`"
            echo "- Frontend: https://sagemro.cn/"
            echo "- Admin: https://admin.sagemro.cn/"
            echo "- Engineer: https://engineer.sagemro.cn/"
            echo "- API health: https://api.sagemro.cn/health"
          } >> "$GITHUB_STEP_SUMMARY"
