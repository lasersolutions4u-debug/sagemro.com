name: Deploy to Cloudflare

# 触发策略：
#   - push 到 main：跑测试 → 通过后部署 frontend / worker / admin 到国际版生产
#   - push 到 china-edition：跑测试 → 通过后部署中国版 frontend / admin
#   - PR：只跑测试和 build，绝不部署（用 jobs 层 if: 门禁兜底）
on:
  push:
    branches: [main, china-edition]
  pull_request:
    branches: [main]

jobs:
  # ============ 测试门禁（所有 deploy job 的前置条件）============
  test:
    name: Test & Build Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Worker 单元测试（必须通过）
      - name: Worker unit tests
        working-directory: worker
        run: |
          if [ -f package.json ]; then
            npm install --no-audit --no-fund
            npm test
          else
            echo "worker/package.json missing — skipping"
            exit 1
          fi

      # Frontend lint + build（编译失败直接挂）
      - name: Frontend install
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      # Admin build（编译失败直接挂）
      - name: Admin install
        working-directory: admin
        run: npm install --no-audit --no-fund

      - name: Admin build
        working-directory: admin
        run: npm run build

  # ============ 部署 Frontend ============
  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    needs: test
    # 仅 main / china-edition 分支 push 触发前端部署
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/china-edition')
    runs-on: ubuntu-latest
    # GitHub Environment 门禁：在仓库 Settings → Environments → production
    # 里配置 required reviewers，进一步防误部署
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy frontend/dist --project-name=${{ github.ref == 'refs/heads/main' && 'sagemro-com' || 'sagemro-cn' }} --branch=${{ github.ref_name }}

  # ============ 部署 Worker ============
  deploy-worker:
    name: Deploy Worker to Cloudflare Workers
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Check D1 migrations are applied
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: worker
        run: |
          echo "=== Checking D1 migration status ==="
          wrangler d1 execute sagemro-db --env production --remote \
            --command "SELECT version FROM _migrations ORDER BY version;" \
            > /tmp/sagemro-d1-migrations.txt

          APPLIED=$(grep -Eo '[0-9]{3}[a-z]?_[A-Za-z0-9_]+' /tmp/sagemro-d1-migrations.txt | sort -u || true)
          LOCAL_FILES=$(find migrations -maxdepth 1 -type f -name '*.sql' -print \
            | sed 's#^migrations/##; s#\.sql$##' \
            | grep -v '^022_cn_full_schema$' \
            | sort -u)

          echo "Applied versions: $APPLIED"
          echo "Local migration files: $LOCAL_FILES"

          MISSING=""
          for ver in $LOCAL_FILES; do
            if ! echo "$APPLIED" | grep -q "^${ver}$"; then
              MISSING="$MISSING $ver"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo ""
            echo "❌ UNAPPLIED MIGRATIONS FOUND:$MISSING"
            echo ""
            echo "These migration files exist locally but have NOT been applied to production D1."
            echo "You must run them manually BEFORE deploying the Worker:"
            echo ""
            for ver in $MISSING; do
              echo "  wrangler d1 execute sagemro-db --env production --remote --file migrations/${ver}.sql"
            done
            echo ""
            echo "See DEPLOY.md for details."
            exit 1
          fi

          echo "✅ All migrations are applied."

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: worker
        run: wrangler deploy --env production

  # ============ 部署 Admin ============
  deploy-admin:
    name: Deploy Admin Panel to Cloudflare Pages
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/china-edition')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: admin
        run: npm install --no-audit --no-fund

      - name: Build
        working-directory: admin
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy admin/dist --project-name=${{ github.ref == 'refs/heads/main' && 'sagemro-admin' || 'sagemro-admin-cn' }} --branch=${{ github.ref == 'refs/heads/main' && github.ref_name || 'main' }}
