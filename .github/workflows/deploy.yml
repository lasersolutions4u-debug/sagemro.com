name: Deploy to Cloudflare

# 触发策略：
#   - push 到 main：跑测试 → 通过后部署 frontend / worker / admin 到生产
#   - push 到 china-edition：跑测试 → 通过后仅部署中国版 frontend 到 sagemro.cn
#   - PR：只跑测试和 build，绝不部署（用 jobs 层 if: 门禁兜底）
on:
  push:
    branches: [main, china-edition]
  pull_request:
    branches: [main]

jobs:
  # ============ 测试门禁（所有 deploy job 的前置条件）============
  test:
    name: Test & Build Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Worker 单元测试（必须通过）
      - name: Worker unit tests
        working-directory: worker
        run: |
          if [ -f package.json ]; then
            npm install --no-audit --no-fund
            npm test
          else
            echo "worker/package.json missing — skipping"
            exit 1
          fi

      # Frontend lint + build（编译失败直接挂）
      - name: Frontend install
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Frontend build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE: https://api.sagemro.com

      # Admin build（编译失败直接挂）
      - name: Admin install
        working-directory: admin
        run: npm install --no-audit --no-fund

      - name: Admin build
        working-directory: admin
        run: npm run build
        env:
          VITE_API_BASE: https://api.sagemro.com

  # ============ 部署 Frontend ============
  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    needs: test
    # 仅 main / china-edition 分支 push 触发前端部署
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/china-edition')
    runs-on: ubuntu-latest
    # GitHub Environment 门禁：在仓库 Settings → Environments → production
    # 里配置 required reviewers，进一步防误部署
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE: https://api.sagemro.com

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=${{ github.ref == 'refs/heads/main' && 'sagemro-com' || 'sagemro-cn' }} --branch=${{ github.ref_name }}

  # ============ 部署 Worker ============
  deploy-worker:
    name: Deploy Worker to Cloudflare Workers
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Check D1 migrations are applied
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: worker
        run: |
          echo "=== Checking D1 migration status ==="
          wrangler d1 execute sagemro-db --env production --remote --json \
            --command "SELECT version FROM _migrations ORDER BY version;" \
            > /tmp/sagemro-d1-migrations.json

          node <<'JS'
          const fs = require('fs');
          const path = require('path');

          const data = JSON.parse(fs.readFileSync('/tmp/sagemro-d1-migrations.json', 'utf8'));
          const applied = new Set((data[0]?.results || []).map((row) => row.version));
          const local = fs.readdirSync('migrations')
            .filter((name) => name.endsWith('.sql'))
            .map((name) => path.basename(name, '.sql'))
            // 022 initializes an empty CN database and must not be applied to the EN production DB.
            .filter((version) => version !== '022_cn_full_schema')
            .sort();

          const missing = local.filter((version) => !applied.has(version));
          console.log('Applied versions:', [...applied].sort().join(', '));
          console.log('Local migration files:', local.join(', '));

          if (missing.length > 0) {
            console.log('');
            console.log(`❌ UNAPPLIED MIGRATIONS FOUND: ${missing.join(', ')}`);
            console.log('');
            console.log('These migration files exist locally but have NOT been applied to production D1.');
            console.log('You must run them manually BEFORE deploying the Worker:');
            console.log('');
            for (const version of missing) {
              console.log(`  wrangler d1 execute sagemro-db --env production --remote --file migrations/${version}.sql`);
            }
            console.log('');
            console.log('See DEPLOY.md for details.');
            process.exit(1);
          }

          console.log('✅ All migrations are applied.');
          JS

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy --env production

  # ============ 部署 Admin ============
  deploy-admin:
    name: Deploy Admin Panel to Cloudflare Pages
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: admin
        run: npm install --no-audit --no-fund

      - name: Build
        working-directory: admin
        run: npm run build
        env:
          VITE_API_BASE: https://api.sagemro.com

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy admin/dist --project-name=sagemro-admin --branch=${{ github.ref_name }}
