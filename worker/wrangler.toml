name = "sagemro-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "sagemro-db"
database_id = "eb84471f-ed33-47ae-827f-1419f5a9428f"

[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "sagemro-attachments"

[[kv_namespaces]]
binding = "KV"
id = "2d34230fd0e74b0fa83fdd4ee0c934f1"

[vars]
# 默认开发环境。生产部署时通过 [env.production.vars] 覆盖。
ENVIRONMENT = "development"
# R2 公开访问域名（创建 bucket 后从 Cloudflare Dashboard 获取）
# 格式类似: pub-xxxxxxxxxxxxxxxx.r2.dev
R2_PUBLIC_HOST = "pub-b468952d6e244e7d913c90a7ae6f81d6.r2.dev"
# 本地如需固定验证码，可在未提交的 worker/.dev.vars 中设置 DEV_BYPASS_CODE。
# 敏感变量一律通过 wrangler secret put 注入（不在本文件出现）：
#   wrangler secret put OPENAI_API_KEY            --env production
#   wrangler secret put OPENAI_API_ENDPOINT       --env production
#   wrangler secret put JWT_SECRET                --env production
#   wrangler secret put ADMIN_PHONE               --env production
#   wrangler secret put ADMIN_PASSWORD            --env production
#   wrangler secret put ADMIN_PHONE_CN            --env production
#   wrangler secret put ADMIN_PASSWORD_CN         --env production
#   wrangler secret put ONESIGNAL_APP_ID          --env production
#   wrangler secret put ONESIGNAL_REST_API_KEY    --env production

# 生产环境配置：部署使用 wrangler deploy --env production
[env.production]
name = "sagemro-api"

[env.production.vars]
ENVIRONMENT = "production"
R2_PUBLIC_HOST = "pub-b468952d6e244e7d913c90a7ae6f81d6.r2.dev"
VERIFICATION_EMAIL_FROM = "SAGEMRO <verify@sagemro.com>"

[[env.production.d1_databases]]
binding = "DB"
database_name = "sagemro-db"
database_id = "eb84471f-ed33-47ae-827f-1419f5a9428f"

# CN 数据库（sagemro.cn 请求自动路由到此库）
[[env.production.d1_databases]]
binding = "DB_CN"
database_name = "sagemro-db-cn"
database_id = "d5f3a70f-6478-45d1-b73b-84d833afdcfa"

[[env.production.r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "sagemro-attachments"

[[env.production.kv_namespaces]]
binding = "KV"
id = "2d34230fd0e74b0fa83fdd4ee0c934f1"

[[env.production.send_email]]
name = "EMAIL"
