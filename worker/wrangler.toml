name = "sagemro-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "sagemro-db"
database_id = "eb84471f-ed33-47ae-827f-1419f5a9428f"

[[kv_namespaces]]
binding = "KV"
id = "2d34230fd0e74b0fa83fdd4ee0c934f1"

[vars]
# 默认开发环境。生产部署时通过 [env.production.vars] 覆盖。
ENVIRONMENT = "development"
# 敏感变量一律通过 wrangler secret put 注入（不在本文件出现）：
#   wrangler secret put OPENAI_API_KEY            --env production
#   wrangler secret put OPENAI_API_ENDPOINT       --env production
#   wrangler secret put JWT_SECRET                --env production
#   wrangler secret put ADMIN_PHONE               --env production
#   wrangler secret put ADMIN_PASSWORD            --env production
#   wrangler secret put ONESIGNAL_APP_ID          --env production
#   wrangler secret put ONESIGNAL_REST_API_KEY    --env production

# 生产环境配置：部署使用 wrangler deploy --env production
[env.production]
name = "sagemro-api"

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "sagemro-db"
database_id = "eb84471f-ed33-47ae-827f-1419f5a9428f"

[[env.production.kv_namespaces]]
binding = "KV"
id = "2d34230fd0e74b0fa83fdd4ee0c934f1"
